name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  host:
    name: Host crates (cbc-core, cbc-drivers, cbc-proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  python:
    name: Host package (cbc_daq)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy
      - run: PYTHONPATH=.:tests python -m unittest discover -s tests -v

  firmware:
    name: Firmware (thumbv8m.main-none-eabihf)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: thumbv8m.main-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
