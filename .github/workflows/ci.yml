name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  host:
    name: Host crates (helic-core, helic-drivers, helic-proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  python:
    name: Host package (helic_daq)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host-python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install numpy
      - run: PYTHONPATH=.:tests python -m unittest discover -s tests -v

  julia:
    name: Host package (HelicDAQ.jl)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host-julia
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: julia-actions/setup-julia@5c9647d97b78a5debe5164e9eec09d653d29bd71 # v2.6.1
        with:
          version: "1.10"
      - run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.test()'

  matlab:
    name: Host package (helicdaq)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: matlab-actions/setup-matlab@a0180c939fb1a28de13f44f7b778b912384ced1f # v3.0.1
        with:
          products: Instrument_Control_Toolbox
      - uses: matlab-actions/run-command@bcd446a219949c24051c1d04a4b4e0274c42f23b # v3.2.0
        with:
          command: cd("host-matlab"); runTests();

  firmware:
    name: Firmware (thumbv8m.main-none-eabihf)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
          targets: thumbv8m.main-none-eabihf
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: firmware -> target
      - run: cargo fmt --all -- --check
      - run: cargo clippy --release --workspace -- -D warnings
      - run: cargo build --release --workspace
      - name: Build W6100 wired variants
        run: |
          cargo build --release -p fw-cbc-rig --no-default-features --features board-w6100
          cargo build --release -p fw-whirl-rig --no-default-features --features board-w6100
          cargo build --release -p fw-pwm-rig --no-default-features --features board-w6100
          cargo build --release -p fw-sig-gen --no-default-features --features board-w6100
